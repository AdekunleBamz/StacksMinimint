[project]
name = 'stacksminimint'
description = 'A minimal NFT minting platform on Stacks'
authors = []
telemetry = false
cache_dir = './.cache'
requirements = []

[contracts.sip-009-nft-trait]
path = 'contracts/archive/sip-009-nft-trait.clar'
clarity_version = 2
epoch = 2.4

[contracts.sip-010-trait-ft-standard]
path = 'contracts/archive/sip-010-trait-ft-standard.clar'
clarity_version = 2
epoch = 2.4

[contracts.minimint-core]
path = 'contracts/minimint-core.clar'
clarity_version = 2
epoch = 2.4

[contracts.minimint-token]
path = 'contracts/minimint-token.clar'
clarity_version = 2
epoch = 2.4

[contracts.minimint-hub]
path = 'contracts/minimint-hub.clar'
clarity_version = 2
epoch = 2.4
depends_on = ["minimint-core", "minimint-token"]

[repl.analysis]
passes = ['call_checker', 'check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = true
api_url = 'https://api.hiro.so'
